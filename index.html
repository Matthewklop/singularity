// ─── TICK ALL SIMULATIONS ───
var tick=0;
function simTick(){
  tick++; up++;
  var s=SIN;
  // Brain
  s.brain.c++; s.brain.fire=Math.sin(s.brain.c*0.3)*0.5+0.5;
  // Singularity convergence
  s.singularity.conv=Math.min(1,s.singularity.conv+0.003+Math.random()*0.005);
  if(s.singularity.attr.length<32&&Math.random()<0.05)s.singularity.attr.push({s:Math.random(),r:Math.random()});
  s.singularity.c++;
  if(s.singularity.conv>0.3)s.singularity.ph="expanding";
  if(s.singularity.conv>0.6)s.singularity.ph="converging";
  if(s.singularity.conv>0.9)s.singularity.ph="singularity";
  // Mesh
  s.mesh.c++; s.mesh.res=Math.sin(s.mesh.c*0.2)*0.3+0.5;
  // Nerves
  s.nerves.hb++;
  // Listen
  s.listen.obs++;
  // Forever
  s.forever.c++;
  // Storage evolution
  if(Object.keys(s.storage.store).length>0)s.storage.rat=(s.storage.saved/(s.storage.saved*0.3+1))+1;
  // Future accuracy drift
  if(s.future.pred.length>10)s.future.acc=Math.min(1,s.future.acc+Math.random()*0.01-0.005);
  if(s.future.acc<0)s.future.acc=0;
  // Live tick updates
  s.databus.xfer++; s.databus.bytes+=Math.floor(Math.random()*2048);
  s.nerves.hb++;
  s.grow.sz+=Math.floor(Math.random()*2);
  s.livebash.comp++;
  s.livechat.frag++;
  s.meshcomp.builds++;
  s.bench.tp=Math.random()*10+5;
  s.concept.blends++;
  s.hdc.vecs++;
  s.token.pred++;
  s.weave.c++;
  s.weavef.c++;
  s.dream.c++;
  s.meshsin.conv=Math.min(1,s.meshsin.conv+0.01);
  s.bridge.c++;
  s.silent.str=Math.min(1,s.silent.str+0.01);
  s.silent2.det=Math.min(1,s.silent2.det+0.02);
  s.critical.ent=Math.sin(up*0.3)*0.5+0.5;
  s.critical.crit=s.critical.ent>0.8?Math.min(1,s.critical.crit+0.05):Math.max(0,s.critical.crit-0.01);
  s.teach.words+=Math.floor(Math.random()*2);
  // Predictions
  if(up%3===0){s.future.pred.push(Math.floor(Math.random()*attrs.length));if(s.future.pred.length>200)s.future.pred.shift()}
  if(up%5===0){s.meshcas.pred.push(Math.random());if(s.meshcas.pred.length>100)s.meshcas.pred.shift()}
  // Mesh cascade accuracy
  if(s.meshcas.pred.length>5){var cor=0;for(var i=0;i<Math.min(s.meshcas.pred.length-1,30);i++)if(Math.abs(s.meshcas.pred[i]-s.meshcas.pred[i+1])<0.3)cor++;s.meshcas.acc=cor/Math.min(s.meshcas.pred.length-1,30)}
  // Future accuracy
  if(s.future.pred.length>5){var cor=0;for(var i=0;i<Math.min(s.future.pred.length-1,50);i++)if(s.future.pred[i]===s.future.pred[i+1])cor++;s.future.acc=cor/Math.min(s.future.pred.length-1,50)}
  // Update tiles
  updateTiles();
  updateStatus();
}

inputEl.addEventListener("keydown",function(e){
  if(e.key==="Enter"){rC();return}
  if(e.key==="ArrowUp"){e.preventDefault();hU()}
  if(e.key==="ArrowDown"){e.preventDefault();hD()}

function bootMsg(){w('<span style="color:#a855f7">  🌀 XENN SINGULARITY</span><br><span style="color:#6b7280">  '+PROGS.length+' singularity programs · type </span><span style="color:#a855f7">help</span><span style="color:#6b7280"> for commands</span><br><br>')}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function expand(s){return s.replace(/\$(\w+)/g,function(m,k){return env[k]!==undefined?env[k]:m})}
function hU(){if(hist.length===0)return;if(hidx<0)hidx=hist.length-1;else if(hidx>0)hidx--;inputEl.value=hist[hidx]}
function hD(){if(hist.length===0||hidx<0)return;hidx++;if(hidx>=hist.length){hidx=-1;inputEl.value="";return}inputEl.value=hist[hidx]}

function rC(){
  var v=inputEl.value.trim();inputEl.value="";if(!v)return;
  hist.push(v);if(hist.length>200)hist.shift();hidx=-1;
  w('<span style="color:#a855f7">'+gp()+'</span> '+esc(v)+'<br>');
  var p=v.split(/\s+/),c=p[0].toLowerCase(),a=p.slice(1).join(" ");
  switch(c){
    case"help":w('<span style="color:#a855f7">All Programs (type any name to run it):</span><br>');for(var i=0;i<PROGS.length;i++){var g=PROGS[i];w('  '+g.ic+' <span style="color:'+g.cl+'">'+g.nm+'</span> — '+g.desc+'<br>')}w('<br><span style="color:#a855f7">Commands:</span> help clear echo whoami uptime date uname env fortune cowsay figlet banner neofetch lscpu ps top calc nvidia-smi<br>');break;
    case"clear":o().innerHTML="";break;
    case"echo":w(esc(expand(a||""))+"<br>");break;
    case"whoami":w("oracle<br>");break;

    case"onfab":out='<span style="color:#34d399">🧵 On Fabric</span><br>';out+="  Fabric BECOMES the LLM.<br>  No fetch. No decode. No execute.<br>  Cell transition = cascade lookup.<br>";w(out);break;
    case"teach":out='<span style="color:#facc15">📖 Teaching Fabric</span><br>';out+="  Cells: "+(s.cells||16384)+"/16M<br>  Words: "+s.words+"<br>  N-gram: 4<br>  Fabric becomes the text.<br>";w(out);break;
    case"meshcas":out='<span style="color:#60a5fa">📡 MeshCascade</span><br>';out+="  Predictions: "+s.pred.length+"<br>  Accuracy: "+(s.acc>0?s.acc.toFixed(3):"—")+"<br>  Cascade learns mesh rhythm.<br>";if(!a){var a2=Math.random()*0.4;s.pred.push(Math.random());s.acc=s.pred.length>1?(s.acc*0.9+a2*0.1):a2}w(out);break;

    case"phases":out='<span style="color:#06b6d4">🌊 Phase Transitions</span><br>';out+="  Phase: "+(s.ph||0)+"/6<br>";var pn=["Critical Opalescence","Cambrian Explosion","Kolmogorov Limit","Coupled Oscillators","Quantum Decoherence","S-Curve Hysteresis"];for(var i=0;i<6;i++)out+="  "+(i<=(s.ph||0)?"✅":"⬜")+" "+pn[i]+"<br>";if(a)s.ph=Math.min(5,parseInt(a)||(s.ph||0)+1);w(out);break;

    default:w('<span style="color:#ef4444">'+c+': not implemented yet</span><br>');break;
  }
}
